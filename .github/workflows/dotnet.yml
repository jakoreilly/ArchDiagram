name: .NET

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore
      run: dotnet restore tests/ArchDiagram.Tests/ArchDiagram.Tests.csproj
    - name: Build
      run: dotnet build tests/ArchDiagram.Tests/ArchDiagram.Tests.csproj --no-restore
    - name: Test
      run: dotnet test tests/ArchDiagram.Tests/ArchDiagram.Tests.csproj --no-build --verbosity normal
